name: LeetCode Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 0"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync recent accepted submissions from LeetCode
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          LEETCODE_USERNAME: ${{ vars.LEETCODE_USERNAME || 'EarnTHYPart' }}
          LEETCODE_SYNC_LIMIT: ${{ vars.LEETCODE_SYNC_LIMIT || '20' }}
        run: |
          set -euo pipefail
          mkdir -p solutions
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const session = process.env.LEETCODE_SESSION;
          const csrf = process.env.LEETCODE_CSRF_TOKEN;
          const username = process.env.LEETCODE_USERNAME;
          const limit = Math.max(1, Number(process.env.LEETCODE_SYNC_LIMIT || '20'));

          if (!session || !csrf) {
            throw new Error('Missing required secrets: LEETCODE_SESSION and LEETCODE_CSRF_TOKEN');
          }

          const cookie = `LEETCODE_SESSION=${session}; csrftoken=${csrf}`;
          const headers = {
            'Content-Type': 'application/json',
            'x-csrftoken': csrf,
            Cookie: cookie,
            Referer: 'https://leetcode.com/',
            'User-Agent': 'github-actions-leetcode-sync',
          };

          const extByLang = {
            cpp: 'cpp', c: 'c', csharp: 'cs', golang: 'go',
            java: 'java', javascript: 'js', kotlin: 'kt',
            mysql: 'sql', 'ms sql server': 'sql', oracle: 'sql',
            php: 'php', python: 'py', python3: 'py',
            ruby: 'rb', rust: 'rs', scala: 'scala',
            swift: 'swift', typescript: 'ts',
          };

          const normalizeLang = (lang) => String(lang || '').trim().toLowerCase();

          async function sleep(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
          }

          async function graphql(query, variables = {}, retries = 3) {
            let lastErr;
            for (let attempt = 1; attempt <= retries; attempt++) {
              try {
                const res = await fetch('https://leetcode.com/graphql', {
                  method: 'POST',
                  headers,
                  body: JSON.stringify({ query, variables }),
                });
                const text = await res.text();
                if (!res.ok) throw new Error(`GraphQL failed (${res.status}): ${text.slice(0, 300)}`);
                const json = JSON.parse(text);
                if (json.errors) throw new Error(`GraphQL errors: ${JSON.stringify(json.errors).slice(0, 300)}`);
                return json.data;
              } catch (err) {
                lastErr = err;
                if (attempt < retries) await sleep(500 * attempt);
              }
            }
            throw lastErr;
          }

          async function fetchRecentAccepted(user, lim) {
            const data = await graphql(`
              query recentAcSubmissions($username: String!, $limit: Int!) {
                recentAcSubmissionList(username: $username, limit: $limit) {
                  id title titleSlug lang
                }
              }
            `, { username: user, limit: lim });
            return data?.recentAcSubmissionList || [];
          }

          async function fetchSubmissionDetail(submissionId) {
            const data = await graphql(`
              query submissionDetails($submissionId: Int!) {
                submissionDetails(submissionId: $submissionId) {
                  code
                  lang { name }
                }
              }
            `, { submissionId: Number(submissionId) });
            return data?.submissionDetails || null;
          }

          async function main() {
            console.log(`Sync start for user: ${username}`);
            const submissions = await fetchRecentAccepted(username, limit);

            if (!submissions.length) {
              console.log('No accepted submissions found.');
              return;
            }

            console.log(`Found ${submissions.length} submission(s). Fetching code...`);
            let savedCount = 0, skippedCount = 0;

            for (const sub of submissions) {
              const { id, titleSlug, lang } = sub;
              let detail;
              try {
                detail = await fetchSubmissionDetail(id);
              } catch (err) {
                skippedCount++;
                console.warn(`Skipping ${titleSlug} (${id}): ${err?.message || err}`);
                continue;
              }

              const code = detail?.code;
              if (!code?.trim()) {
                skippedCount++;
                console.warn(`Skipping ${titleSlug} (${id}): empty code`);
                continue;
              }

              const langName = normalizeLang(detail?.lang?.name || lang);
              const ext = extByLang[langName] || 'txt';
              const safeSlug = String(titleSlug).replace(/[^a-zA-Z0-9-]/g, '-');
              const filePath = path.join('solutions', `${safeSlug}.${ext}`);
              fs.writeFileSync(filePath, code.trimEnd() + '\n', 'utf8');
              savedCount++;
              console.log(`Synced ${filePath}`);
              await sleep(300);
            }

            console.log(`Finished. Saved ${savedCount} file(s), skipped ${skippedCount}.`);
          }

          main().catch((err) => {
            console.error('LeetCode sync failed:', err?.message || err);
            process.exit(1);
          });
          NODE

      - name: Commit and push changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add solutions
          if git diff --cached --quiet; then
            echo "No solution changes to commit."
            exit 0
          fi
          git commit -m "chore: sync LeetCode solutions"
          git push
