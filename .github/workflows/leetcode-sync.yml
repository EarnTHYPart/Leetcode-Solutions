name: LeetCode Sync

on:
  workflow_dispatch:
  schedule:
    # Every Sunday at 04:00 UTC
    - cron: "0 4 * * 0"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Sync recent accepted submissions from LeetCode
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION_TOKEN }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.CSRF_TOKEN }}
          LEETCODE_USERNAME: ${{ vars.LEETCODE_USERNAME || 'EarnTHYPart' }}
          LEETCODE_SYNC_LIMIT: ${{ vars.LEETCODE_SYNC_LIMIT || '20' }}
        run: |
          set -euo pipefail
          mkdir -p solutions
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const session = process.env.LEETCODE_SESSION;
          const csrf = process.env.LEETCODE_CSRF_TOKEN;
          const username = process.env.LEETCODE_USERNAME;
          const limit = Math.max(1, Number(process.env.LEETCODE_SYNC_LIMIT || '20'));

          if (!session || !csrf) {
            throw new Error('Missing required secrets: LEETCODE_SESSION_TOKEN and CSRF_TOKEN');
          }

          const cookie = `LEETCODE_SESSION=${session}; csrftoken=${csrf}`;
          const headers = {
            Accept: 'application/json',
            'x-csrftoken': csrf,
            Cookie: cookie,
            Referer: 'https://leetcode.com/',
            'User-Agent': 'github-actions-leetcode-sync',
          };

          const extByLang = {
            cpp: 'cpp',
            c: 'c',
            csharp: 'cs',
            golang: 'go',
            java: 'java',
            javascript: 'js',
            kotlin: 'kt',
            mysql: 'sql',
            'ms sql server': 'sql',
            oracle: 'sql',
            php: 'php',
            python: 'py',
            python3: 'py',
            ruby: 'rb',
            rust: 'rs',
            scala: 'scala',
            swift: 'swift',
            typescript: 'ts',
          };

          const normalizeLang = (lang) => String(lang || '').trim().toLowerCase();

          async function sleep(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
          }

          async function requestJson(url, options) {
            const res = await fetch(url, options);
            const text = await res.text();

            if (!res.ok) {
              throw new Error(`Request failed (${res.status}) for ${url}: ${text.slice(0, 300)}`);
            }

            try {
              return JSON.parse(text);
            } catch {
              throw new Error(`Expected JSON from ${url}, got: ${text.slice(0, 300)}`);
            }
          }

          async function requestJsonWithRetry(url, options, retries = 3) {
            let lastErr;
            for (let attempt = 1; attempt <= retries; attempt += 1) {
              try {
                return await requestJson(url, options);
              } catch (err) {
                lastErr = err;
                if (attempt < retries) {
                  await sleep(500 * attempt);
                }
              }
            }
            throw lastErr;
          }

          async function requestSubmissionDetail(subId) {
            const urls = [
              `https://leetcode.com/api/submissions/${subId}/`,
              `https://leetcode.com/api/submissions/${subId}`,
            ];

            let lastError = null;
            for (const url of urls) {
              try {
                const detail = await requestJsonWithRetry(url, { headers });
                if (detail && detail.code) {
                  return detail;
                }
              } catch (err) {
                lastError = err;
              }
            }
            throw lastError || new Error(`Unable to fetch submission detail for ID ${subId}`);
          }

          async function main() {
            console.log(`Sync start for user: ${username}`);

            const pageSize = Math.min(100, Math.max(20, limit * 2));
            const list = await requestJsonWithRetry(
              `https://leetcode.com/api/submissions/?offset=0&limit=${pageSize}`,
              { headers }
            );

            const allSubs = Array.isArray(list?.submissions_dump) ? list.submissions_dump : [];

            const accepted = allSubs
              .filter((s) => s && String(s.status_display || '').toLowerCase() === 'accepted')
              .slice(0, limit)
              .map((s) => ({
                id: s.id,
                titleSlug: s.title_slug,
              }));

            if (accepted.length === 0) {
              console.log('No accepted submissions found.');
              return;
            }

            let savedCount = 0;
            for (const sub of accepted) {
              const subId = sub?.id;
              const slug = sub?.titleSlug;
              if (!subId || !slug) {
                continue;
              }

              const detail = await requestSubmissionDetail(subId);
              const lang = normalizeLang(detail?.lang);
              const ext = extByLang[lang] || 'txt';
              const code = detail?.code;

              if (!code || !code.trim()) {
                continue;
              }

              const safeSlug = String(slug).replace(/[^a-zA-Z0-9-]/g, '-');
              const filePath = path.join('solutions', `${safeSlug}.${ext}`);
              fs.writeFileSync(filePath, code.trimEnd() + '\n', 'utf8');
              savedCount += 1;
              console.log(`Synced ${filePath}`);
            }

            console.log(`Finished. Saved ${savedCount} file(s).`);
          }

          main().catch((err) => {
            console.error('LeetCode sync failed:', err && err.message ? err.message : err);
            process.exit(1);
          });
          NODE

      - name: Commit and push changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add solutions
          if git diff --cached --quiet; then
            echo "No solution changes to commit."
            exit 0
          fi
          git commit -m "chore: sync LeetCode solutions"
          git push
