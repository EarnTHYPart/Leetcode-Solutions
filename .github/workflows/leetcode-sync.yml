name: Sync LeetCode Solutions

on:
  workflow_dispatch:
  schedule:
    # Every Sunday at 04:00 UTC
    - cron: "0 4 * * 0"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync recent accepted submissions from LeetCode
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION || secrets.LEETCODE_SESSION_TOKEN }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN || secrets.CSRF_TOKEN }}
          LEETCODE_USERNAME: ${{ vars.LEETCODE_USERNAME || 'EarnTHYPart' }}
          LEETCODE_SYNC_LIMIT: ${{ vars.LEETCODE_SYNC_LIMIT || '20' }}
        run: |
          set -euo pipefail
          mkdir -p solutions
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const session = process.env.LEETCODE_SESSION;
          const csrf = process.env.LEETCODE_CSRF_TOKEN;
          const username = process.env.LEETCODE_USERNAME;
          const limit = Number(process.env.LEETCODE_SYNC_LIMIT || '20');

          if (!session || !csrf) {
            throw new Error(
              'Missing required secrets: LEETCODE_SESSION, LEETCODE_CSRF_TOKEN'
            );
          }

          const cookie = `LEETCODE_SESSION=${session}; csrftoken=${csrf}`;
          const headers = {
            'Content-Type': 'application/json',
            Accept: 'application/json',
            'x-csrftoken': csrf,
            Cookie: cookie,
            Referer: 'https://leetcode.com/',
            'User-Agent': 'github-actions-leetcode-sync',
          };

          const extByLang = {
            cpp: 'cpp',
            c: 'c',
            csharp: 'cs',
            golang: 'go',
            java: 'java',
            javascript: 'js',
            kotlin: 'kt',
            mysql: 'sql',
            'ms sql server': 'sql',
            oracle: 'sql',
            php: 'php',
            python: 'py',
            python3: 'py',
            ruby: 'rb',
            rust: 'rs',
            scala: 'scala',
            swift: 'swift',
            typescript: 'ts',
          };

          const normalizeLang = (lang) => String(lang || '').trim().toLowerCase();

          const recentSubmissionsQuery = `
            query recentAcSubmissionList($username: String!) {
              recentAcSubmissionList(username: $username) {
                id
                title
                titleSlug
                timestamp
              }
            }
          `;

          async function requestJson(url, options) {
            const res = await fetch(url, options);
            if (!res.ok) {
              const body = await res.text();
              throw new Error(`Request failed (${res.status}): ${body.slice(0, 300)}`);
            }
            const contentType = res.headers.get('content-type') || '';
            if (!contentType.includes('application/json')) {
              const body = await res.text();
              throw new Error(`Expected JSON from ${url} but got: ${body.slice(0, 300)}`);
            }
            return res.json();
          }

          async function requestSubmissionDetail(subId) {
            const urls = [
              `https://leetcode.com/api/submissions/${subId}/`,
              `https://leetcode.com/api/submissions/${subId}`,
            ];

            let lastError = null;
            for (const url of urls) {
              try {
                const detail = await requestJson(url, { headers });
                if (detail && detail.code) {
                  return detail;
                }
              } catch (err) {
                lastError = err;
              }
            }
            throw lastError || new Error(`Unable to fetch submission detail for ID ${subId}`);
          }

          async function main() {
            const graph = await requestJson('https://leetcode.com/graphql', {
              method: 'POST',
              headers,
              body: JSON.stringify({
                query: recentSubmissionsQuery,
                variables: { username },
              }),
            });

            if (Array.isArray(graph?.errors) && graph.errors.length > 0) {
              const firstError = graph.errors[0]?.message || 'Unknown GraphQL error';
              throw new Error(`LeetCode GraphQL error: ${firstError}`);
            }

            const submissions = (graph?.data?.recentAcSubmissionList || []).slice(0, limit);
            if (!Array.isArray(submissions) || submissions.length === 0) {
              console.log('No accepted submissions found.');
              return;
            }

            let savedCount = 0;
            for (const sub of submissions) {
              const subId = sub?.id;
              const slug = sub?.titleSlug;
              if (!subId || !slug) {
                continue;
              }

              const detail = await requestSubmissionDetail(subId);

              const lang = normalizeLang(detail?.lang);
              const ext = extByLang[lang] || 'txt';
              const code = detail?.code;

              if (!code || !code.trim()) {
                continue;
              }

              const safeSlug = String(slug).replace(/[^a-zA-Z0-9-]/g, '-');
              const filePath = path.join('solutions', `${safeSlug}.${ext}`);
              fs.writeFileSync(filePath, code.trimEnd() + '\n', 'utf8');
              savedCount += 1;
              console.log(`Synced ${filePath}`);
            }

            console.log(`Finished. Saved ${savedCount} file(s).`);
          }

          main().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          NODE

      - name: Commit and push changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add solutions
          if git diff --cached --quiet; then
            echo "No solution changes to commit."
            exit 0
          fi
          git commit -m "chore: sync LeetCode solutions"
          git push
